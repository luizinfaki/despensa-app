services:
  - type: web
    name: despensa-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: API_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
